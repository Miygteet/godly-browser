<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple JavaScript Browser</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f1f3f4;
        }

        /* Browser UI/Toolbar Styling */
        #toolbar {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background-color: #dee1e6;
            border-bottom: 1px solid #ccc;
            gap: 8px;
        }

        button {
            padding: 6px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
        }

        button:hover {
            background-color: #f8f9fa;
        }

        #url-bar {
            flex-grow: 1;
            padding: 8px 16px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }

        #url-bar:focus {
            border-color: #8ab4f8;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }

        /* Iframe Styling */
        #browser-view {
            flex-grow: 1;
            width: 100%;
            border: none;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <button id="btn-back" title="Go Back">←</button>
        <button id="btn-forward" title="Go Forward">→</button>
        <button id="btn-refresh" title="Refresh">↻</button>
        <input type="text" id="url-bar" placeholder="Enter URL or search term..." value="https://example.com">
        <button id="btn-go">Go</button>
    </div>

    <iframe id="browser-view" src="https://example.com"></iframe>

    <script src="index.js">
    </script>
</body>
</html>
